name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend · lint / type / test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: invoce
          POSTGRES_PASSWORD: invoce
          POSTGRES_DB: invoce
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U invoce"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://invoce:invoce@localhost:5432/invoce
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-secret-ci-secret-ci-secret-1234
      FERNET_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - name: Ruff (lint)
        run: ruff check .
      - name: Black (format check)
        run: black --check .
      - name: Mypy (types)
        run: mypy app
      - name: Alembic migrate
        run: alembic upgrade head
      - name: Pytest (coverage ≥ 80%)
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=80

  frontend:
    name: Frontend · lint / build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # 模板 .gitignore 忽略 lockfile，故用 npm install（.npmrc 已含 legacy-peer-deps）
      - run: npm install --legacy-peer-deps
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  security:
    name: Security · secrets / deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Trivy (filesystem vuln scan)
        # 直接装二进制，避开 trivy-action 的传递依赖版本问题
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          # 初期报告为主不阻断（--exit-code 0）；稳定后改为 1 让高危漏洞 fail CI
          trivy fs --severity HIGH,CRITICAL --ignore-unfixed --exit-code 0 --no-progress .
