name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & push images to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.sha }}
      repo_lc: ${{ steps.meta.outputs.repo_lc }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: |
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "repo_lc=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push api image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo_lc }}/api:latest
            ghcr.io/${{ steps.meta.outputs.repo_lc }}/api:${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          # Next 的 NEXT_PUBLIC_* 构建期注入生产 API 地址（同域名 /api）
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://invoce.vpanel.cc/api
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo_lc }}/frontend:latest
            ghcr.io/${{ steps.meta.outputs.repo_lc }}/frontend:${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # VPS 到 GHCR 带宽有限，首次拉取大镜像较慢，放宽命令超时
          command_timeout: 40m
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_APP_DIR }}"
            git pull --ff-only
            # 用本次运行的 GITHUB_TOKEN 临时登录 GHCR 拉私有镜像（免 PAT）
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            export GH_REPO="${{ needs.build-and-push.outputs.repo_lc }}"
            export IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
            # 拉取前先腾空间：清理 invoce 旧镜像(运行中的会被自动跳过)+悬空层+构建缓存，
            # 避免与 kolmatrix 共用的磁盘被占满导致 pull 解压失败（绝不动其它项目镜像）。
            docker images "ghcr.io/${GH_REPO}/api" "ghcr.io/${GH_REPO}/frontend" --format '{{.Repository}}:{{.Tag}}' | grep -vE ":(latest|${IMAGE_TAG})$" | xargs -r docker rmi -f 2>/dev/null || true
            docker image prune -f || true
            docker builder prune -f || true
            docker compose -f docker-compose.prod.yml pull
            # 先迁移，后重启（单副本，无竞态）
            docker compose -f docker-compose.prod.yml run --rm api alembic upgrade head
            docker compose -f docker-compose.prod.yml up -d
            # 让 :latest 跟随本次部署，手动运维一次性任务(docker compose run)时即可取到最新代码
            docker tag "ghcr.io/${GH_REPO}/api:${IMAGE_TAG}" "ghcr.io/${GH_REPO}/api:latest" || true
            docker tag "ghcr.io/${GH_REPO}/frontend:${IMAGE_TAG}" "ghcr.io/${GH_REPO}/frontend:latest" || true
            docker logout ghcr.io || true
            # 部署后再清理被替换下来的旧 sha 镜像（仅 invoce 自己的；:latest 与本次 sha 保留）
            docker images "ghcr.io/${GH_REPO}/api" "ghcr.io/${GH_REPO}/frontend" --format '{{.Repository}}:{{.Tag}}' | grep -vE ":(latest|${IMAGE_TAG})$" | xargs -r docker rmi -f 2>/dev/null || true
            docker image prune -f || true
