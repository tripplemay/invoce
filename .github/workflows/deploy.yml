name: Deploy

on:
  # VPS secrets 就绪后，取消下面两行注释即可启用「合并 main 自动部署」
  # push:
  #   branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & push images to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.sha }}
      repo_lc: ${{ steps.meta.outputs.repo_lc }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: |
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "repo_lc=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push api image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo_lc }}/api:latest
            ghcr.io/${{ steps.meta.outputs.repo_lc }}/api:${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo_lc }}/frontend:latest
            ghcr.io/${{ steps.meta.outputs.repo_lc }}/frontend:${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: build-and-push
    runs-on: ubuntu-latest
    # 在仓库 Settings → Environments 给 production 加保护规则 → 需人工 approve 才上生产
    environment: production
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_APP_DIR }}"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            export GH_REPO="${{ needs.build-and-push.outputs.repo_lc }}"
            export IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
            docker compose -f docker-compose.prod.yml pull
            # 先迁移，后重启（单副本，无竞态）
            docker compose -f docker-compose.prod.yml run --rm api alembic upgrade head
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
