# invoce.vpanel.cc —— 反代到本机 docker 容器（前端 3100 / 后端 8000）
# 部署在服务器 /etc/nginx/sites-available/invoce，软链到 sites-enabled。
# 仅含 HTTP(80)；`certbot --nginx -d invoce.vpanel.cc` 会自动追加 443/SSL 并加 80→443 跳转。
server {
    listen 80;
    listen [::]:80;
    server_name invoce.vpanel.cc;

    client_max_body_size 25m;  # 发票文件上传

    # API：去掉 /api 前缀转发到后端（proxy_pass 末尾斜杠生效）
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 其余全部走前端 Next.js
    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
